name: Build IPK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}/${{ matrix.subtarget }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86
            subtarget: 64
          - target: armsr
            subtarget: armv8
          - target: mediatek
            subtarget: mt7622
          - target: ramips
            subtarget: mt7621

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext unzip python3 python3-distutils

      - name: Download OpenWrt SDK
        run: |
          SDK_URL="https://downloads.openwrt.org/releases/23.05.3/targets/${{ matrix.target }}/${{ matrix.subtarget }}/openwrt-sdk-23.05.3-${{ matrix.target }}-${{ matrix.subtarget }}_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
          echo "Downloading SDK from: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.tar.xz
          mkdir -p sdk
          tar -xf sdk.tar.xz --strip-components=1 -C sdk
          rm sdk.tar.xz

      - name: Setup SDK
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Add our package
          mkdir -p package/luci-app-5g-cpe-view
          cp -r "${GITHUB_WORKSPACE}/luci-app-5g-cpe-view/"* package/luci-app-5g-cpe-view/

          # Prepare default config
          cat > .config << EOF
          CONFIG_TARGET_${{ matrix.target }}=y
          CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y
          EOF

          make defconfig

      - name: Build package
        run: |
          cd sdk
          make package/luci-app-5g-cpe-view/compile V=s

      - name: Collect IPK files
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/output"
          find sdk/bin/packages/ -name "luci-app-5g-cpe-view*.ipk" -exec cp {} "${GITHUB_WORKSPACE}/output/" \; 2>/dev/null || true
          find sdk/bin/ -name "luci-app-5g-cpe-view*.ipk" -exec cp {} "${GITHUB_WORKSPACE}/output/" \; 2>/dev/null || true
          ls -la "${GITHUB_WORKSPACE}/output/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target }}-${{ matrix.subtarget }}
          path: output/*.ipk
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -name "*.ipk" | sort

      - name: Create Release and Upload IPKs
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
          draft: false
          prerelease: false
