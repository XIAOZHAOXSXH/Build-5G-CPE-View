name: Build IPK

on:
  workflow_dispatch:
  push:
    tags: [ 'v*' ]
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build 5G CPE View IPK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup OpenWrt SDK
        run: |
          echo "Downloading SDK..."
          wget -qO- https://downloads.immortalwrt.org/releases/23.05.1/targets/x86/64/immortalwrt-sdk-23.05.1-x86-64_gcc-12.3.0_musl.Linux-x86_64.tar.xz | tar xJf -
          mv immortalwrt-sdk-* sdk

      - name: Update Feeds
        working-directory: ./sdk
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Prepare Package
        working-directory: ./sdk
        run: |
          mkdir -p package/luci-app-5g-cpe-view
          rsync -av --exclude='sdk' --exclude='.git' --exclude='.github' $GITHUB_WORKSPACE/ package/luci-app-5g-cpe-view/

      - name: Compile Package
        working-directory: ./sdk
        run: |
          make defconfig
          make package/luci-app-5g-cpe-view/compile V=s

      - name: Find and Organize Output
        run: |
          mkdir -p output
          find sdk/bin/packages -name "luci-app-5g-cpe-view*.ipk" -exec cp {} output/ \;
          echo "Build result:"
          ls -l output/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-5g-cpe-view-ipk
          path: output/*.ipk

  release:
    name: Upload to Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: luci-app-5g-cpe-view-ipk
          path: artifact

      - name: Create Release and Upload IPK
        uses: softprops/action-gh-release@v2
        with:
          files: artifact/*.ipk
          generate_release_notes: true
          draft: false
          prerelease: false
