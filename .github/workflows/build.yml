name: Build IPK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target }}/${{ matrix.subtarget }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86
            subtarget: 64
          - target: armsr
            subtarget: armv8
          - target: mediatek
            subtarget: filogic
          - target: ramips
            subtarget: mt7621

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev gawk git libssl-dev gettext unzip python3 python3-distutils wget file

      - name: Download OpenWrt SDK
        run: |
          TARGET="${{ matrix.target }}"
          SUBTARGET="${{ matrix.subtarget }}"
          BASE_URL="https://downloads.openwrt.org/releases/23.05.3/targets/${TARGET}/${SUBTARGET}"

          # Try to find the SDK file from the downloads page
          SDK_FILE=$(wget -qO- "${BASE_URL}/" | grep -oP 'openwrt-sdk-[^"]+\.tar\.xz' | head -1)

          if [ -z "$SDK_FILE" ]; then
            echo "ERROR: Could not find SDK file for ${TARGET}/${SUBTARGET}"
            exit 1
          fi

          SDK_URL="${BASE_URL}/${SDK_FILE}"
          echo "Downloading: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.tar.xz
          mkdir -p sdk
          tar -xf sdk.tar.xz --strip-components=1 -C sdk
          rm sdk.tar.xz

      - name: Setup SDK
        run: |
          cd sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a

          # Add our package
          mkdir -p package/luci-app-5g-cpe-view
          cp -r "${GITHUB_WORKSPACE}/luci-app-5g-cpe-view/"* package/luci-app-5g-cpe-view/

          # Prepare default config (no leading spaces)
          cat > .config <<EOF
          CONFIG_TARGET_${{ matrix.target }}=y
          CONFIG_TARGET_${{ matrix.target }}_${{ matrix.subtarget }}=y
          EOF
          # Remove leading whitespace from config
          sed -i 's/^[[:space:]]*//' .config

          make defconfig

      - name: Build package
        run: |
          cd sdk
          make package/luci-app-5g-cpe-view/compile V=s

      - name: Collect IPK files
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/output"
          find sdk/bin/ -name "luci-app-5g-cpe-view*.ipk" -exec cp {} "${GITHUB_WORKSPACE}/output/" \;
          ls -la "${GITHUB_WORKSPACE}/output/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ matrix.target }}-${{ matrix.subtarget }}
          path: output/*.ipk
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f -name "*.ipk" | sort

      - name: Create Release and Upload IPKs
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
          draft: false
          prerelease: false
